<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UT</title>
<!-- 핵심 스타일 인라인: 외부 CSS 캐시/실패와 무관하게 첫 화면은 항상 표시 -->
<style>
  html,body{height:100%;margin:0;background:#2B2E33;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif}
  .abc-stage{min-height:100%;display:flex;align-items:center;justify-content:center;padding:32px 20px;box-sizing:border-box}
  .abc{display:flex;gap:20px;flex-wrap:wrap;align-items:center;justify-content:center}
  .abc-btn{width:168px;height:168px;border-radius:24px;display:flex;align-items:center;
    justify-content:center;font-size:64px;font-weight:900;color:#E8EAED;text-decoration:none;
    background:#34373d;border:1px solid #4a4e56;transition:.15s;user-select:none}
  .abc-btn:hover,.abc-btn:active{background:#00A8E8;border-color:#00A8E8;color:#fff;transform:translateY(-2px)}
  @media(max-width:560px){.abc{flex-direction:column;gap:16px}
    .abc-btn{width:240px;height:120px;font-size:52px}}
</style>
<link rel="stylesheet" href="styles.css?v=11">
</head>
<body>
<div class="abc-stage">
  <div class="abc">
    <a class="abc-btn" href="feed.html?h=1">A</a>
    <a class="abc-btn" href="feed.html?h=2">B</a>
    <a class="abc-btn" href="feed.html?h=3">C</a>
  </div>
</div>
</body>
</html>
